# ============================================================
# _config.yml — Arun Purohit Personal Website
# Built with Minimal Mistakes Jekyll Theme
# Docs: https://mmistakes.github.io/minimal-mistakes/
# ============================================================

# --- Theme ---
remote_theme: "mmistakes/minimal-mistakes@4.28.0"

# --- Skin ---
# Options: "default" "air" "aqua" "contrast" "dark" "dirt"
#          "neon" "mint" "plum" "sunrise"
minimal_mistakes_skin: "default"

# --- Site Settings ---
locale: "en-US"
title: "Arun Purohit"
title_separator: "|"
subtitle: "Data & AI Professional"
name: "Arun Purohit"
description: "Personal website of Arun Purohit — Data & AI professional. Research, projects, and thoughts on AI/ML."
url: "https://arunvp3799.github.io"
baseurl: ""
repository: "arunvp3799/arunvp3799.github.io"

# --- Author (controls the sidebar profile) ---
author:
  name: "Arun Purohit"
  avatar: "/assets/images/profile.jpg"   # ← Drop your photo here
  bio: |
    Data & AI professional with a passion for building intelligent systems.
    Interested in machine learning, data engineering, and the intersection of
    AI with real-world applications. [CV](/resume/){: .btn .btn--primary .btn--small}
  location: "United States"
  email: "avp3799@gmail.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:avp3799@gmail.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/arunvp3799"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/YOUR-LINKEDIN"     # ← Update this
    - label: "Twitter / X"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/YOUR-TWITTER"          # ← Update or delete this block

# --- Footer Links ---
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/arunvp3799"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/YOUR-LINKEDIN"     # ← Update this

# --- Reading Files ---
include:
  - .htaccess
  - _pages

# --- Exclude from Processing ---
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - tmp

# --- Conversion ---
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# --- Markdown Processing ---
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# --- Sass/SCSS ---
sass:
  sass_dir: _sass
  style: compressed

# --- Outputting ---
permalink: /:categories/:title/
paginate: 5
paginate_path: /blog/page:num/
timezone: America/New_York

# --- Plugins ---
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# --- Archives ---
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# --- HTML Compression ---
compress_html:
  clippings: all
  ignore:
    envs: development

# --- Defaults ---
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true

  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
